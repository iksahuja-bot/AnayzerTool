# ════════════════════════════════════════════════════════════════════
#  EffortAnalyzer – Configuration File
#  All settings can be overridden by passing the equivalent
#  --key=value argument on the command line.
#  CLI arguments always take priority over this file.
# ════════════════════════════════════════════════════════════════════

# ── Module to run ────────────────────────────────────────────────────
# Choose one: analyze | merge | spring | wl-jboss
# Can also be set via: --module=<name>
module=spring


# ════════════════════════════════════════════════════════════════════
#  Module: wl-jboss
#  Scans JARs/WARs/EARs for WebLogic → JBoss migration pitfalls.
# ════════════════════════════════════════════════════════════════════

# Path to a single JAR/WAR/EAR  OR  a directory of archives
# CLI equivalent: --input=<path>
#input.path=C:\\Development\\JBoss\\Jars

# Optional: text file listing JAR paths, one per line
# Use this when archives live in multiple directories
# CLI equivalent: --jar-list=<file>
wl.jar.list.file=

# Output Excel report
# CLI equivalent: --output=<file>
#output.file=WlToJBossMigrationReport.xlsx


# ════════════════════════════════════════════════════════════════════
#  Module: spring
#  Upgrade compatibility: Spring 5.3.39, Guava 31.1-jre, Guice 5.1.0,
#  CGLib→ByteBuddy. Scans JARs for deprecated/removed APIs.
# ════════════════════════════════════════════════════════════════════

# Path to a single JAR  OR  a directory of JARs
# CLI equivalent: --input=<path>
input.path=C:\\Development\\JBoss\\Jars

# Output Excel report   
output.file=SpringDeprecationReport.xlsx

# ════════════════════════════════════════════════════════════════════
#  Module: analyze
#  Reads IBM Transformation Advisor JSON reports and writes Excel.
# ════════════════════════════════════════════════════════════════════

# Sub-folder inside src/main/resources that contains the JSON reports
# CLI equivalent: --report-folder=<name>
analyzer.resource.folder=reports

# Output Excel report
# CLI equivalent: --output=<file>
# output.file=AnalyzerOutput.xlsx

# Enable parallel processing (recommended for 50+ reports)
# CLI equivalent: --parallel=true|false
analyzer.parallel.enabled=true

# Maximum characters per Excel cell (hard limit is 32767)
analyzer.excel.maxCellLength=32000

# Comma-separated rule IDs to exclude from the output
# CLI equivalent: --excluded-rules=Rule1,Rule2
# analyzer.excluded.rules=CLDRLocaleDataByDefault,RunJDeps


# ════════════════════════════════════════════════════════════════════
#  Module: merge
#  Merges a JIRA ticket report with a component list.
# ════════════════════════════════════════════════════════════════════

# Path to the ticket report Excel file
# CLI equivalent: --ticket-file=<file>
merge.ticket.file=TicketReport.xlsx

# Path to the component list Excel file
# CLI equivalent: --component-file=<file>
merge.component.file=ComponentList.xlsx

# Output Excel report
# CLI equivalent: --output=<file>
# output.file=MergedOutput.xlsx
